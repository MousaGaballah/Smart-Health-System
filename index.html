<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Health System</title>
  <link rel="icon" type="image/png" href="assets\icons\heart-rate.png">
  <!-- ==================== FONTS & ICONS ==================== -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <!-- Preloader -->
  <div id="preloader">
    <div class="heartbeat-loader"><i class="fas fa-heartbeat"></i></div>
  </div>

  <!-- ==================== ANIMATED BACKGROUND SHAPES ==================== -->
  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>
  <div class="ecg-line"></div>

  <!-- AI Assistant -->
  <div class="ai-assistant" id="aiBtn"><i class="fas fa-robot"></i></div>
  <div class="ai-popup" id="aiPopup">
    <h4 style="color:var(--text-primary); margin-bottom:10px;">🩺 MediAI</h4>
    <p style="color:var(--text-secondary); font-size:0.9rem;">I can help with symptoms, trends, or explain readings. (Demo)</p>
    <input type="text" placeholder="Ask something..." style="width:100%; padding:8px; border-radius:20px; border:none; margin-top:8px;">
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <div class="login-wrapper">
    <div class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
      <i class="fas fa-sun"></i>
    </div>

    <div class="login-card">
      <div class="login-header">
        <div class="logo-animation">
          <i class="fas fa-heartbeat"></i>
        </div>
        <h2>Smart Health System</h2>
      </div>

      <!-- TABS -->
      <div class="auth-tabs">
        <button class="tab-btn active" id="loginTab"><i class="fas fa-sign-in-alt"></i> Sign In</button>
        <button class="tab-btn" id="registerTab"><i class="fas fa-user-plus"></i> Create Account</button>
      </div>

      <!-- FORMS -->
      <div class="auth-forms">
        <!-- LOGIN FORM -->
        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label for="loginEmail"><i class="far fa-envelope"></i> Email</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope input-icon"></i>
              <input type="email" class="form-control" id="loginEmail" placeholder="doctor@hospital.com" required>
            </div>
          </div>
          <div class="form-group">
            <label for="loginPassword"><i class="fas fa-lock"></i> Password</label>
            <div class="input-wrapper">
              <i class="fas fa-key input-icon"></i>
              <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
              <i class="fas fa-eye toggle-password" data-target="loginPassword"></i>
            </div>
          </div>

          <div class="form-options">
            <label class="remember"><input type="checkbox" id="rememberMe"> Remember me</label>
            <a href="#" class="forgot-link" id="forgotPassword"><i class="fas fa-question-circle"></i> Forgot?</a>
          </div>

          <!-- fake recaptcha + 2FA badge -->
          <div class="security-row">
            <div class="fake-recaptcha"><i class="fab fa-google"></i> I'm not a robot</div>
            <span><i class="fas fa-shield-alt"></i> 2FA enabled</span>
          </div>

          <button type="submit" class="btn-login" id="loginBtn"><i class="fas fa-arrow-right-to-bracket"></i> Sign In</button>
          <div id="loginError" class="error-msg"></div>
        </form>

        <!-- REGISTER FORM -->
        <form id="registerForm" class="auth-form hidden">
          <!-- Profile image upload -->
          <div class="form-group file-upload">
            <label><i class="fas fa-camera"></i> Profile picture</label>
            <input type="file" id="profileUpload" accept="image/*">
            <div class="file-label">
              <img id="profilePreview" src="https://via.placeholder.com/40" alt="preview">
              <span>Click to upload photo</span>
            </div>
          </div>

          <div class="form-group">
            <label><i class="fas fa-user"></i> Full name</label>
            <div class="input-wrapper">
              <i class="fas fa-user input-icon"></i>
              <input type="text" class="form-control" id="regName" required>
            </div>
          </div>

          <div class="form-group">
            <label><i class="far fa-envelope"></i> Email</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope input-icon"></i>
              <input type="email" class="form-control" id="regEmail" required>
            </div>
            <div class="validation-hint" id="emailHint"></div>
          </div>

          <div class="form-group">
            <label><i class="fas fa-user-md"></i> Role</label>
            <div class="input-wrapper">
              <i class="fas fa-briefcase input-icon"></i>
              <select class="form-control" id="regRole" required>
                <option value="" disabled selected>– Select –</option>
                <option value="patient">Patient</option>
                <option value="doctor">Doctor</option>
                <option value="admin">Admin</option>
              </select>
            </div>
          </div>

          <div class="row-fields" style="display:flex; gap:0.8rem; flex-wrap:wrap;">
            <div class="form-group" style="flex:1;">
              <label><i class="fas fa-lock"></i> Password</label>
              <div class="input-wrapper">
                <i class="fas fa-key input-icon"></i>
                <input type="password" class="form-control" id="regPassword" required>
                <i class="fas fa-eye toggle-password" data-target="regPassword"></i>
              </div>
            </div>
            <div class="form-group" style="flex:1;">
              <label><i class="fas fa-check-circle"></i> Confirm</label>
              <div class="input-wrapper">
                <i class="fas fa-key input-icon"></i>
                <input type="password" class="form-control" id="regConfirm" required>
                <i class="fas fa-eye toggle-password" data-target="regConfirm"></i>
              </div>
            </div>
          </div>

          <!-- Password strength -->
          <div class="strength-meter">
            <div class="meter-bar"><div class="meter-fill" id="strengthFill"></div></div>
            <div class="strength-text" style="display:flex; justify-content:space-between;"><span>Strength</span> <span id="strengthLabel">Weak</span></div>
          </div>

          <!-- Terms & conditions -->
          <div class="terms">
            <input type="checkbox" id="termsCheck" required>
            <label for="termsCheck">I agree to <a href="#">Terms</a> and <a href="#">Privacy</a></label>
          </div>

          <button type="submit" class="btn-login" id="registerBtn"><i class="fas fa-user-plus"></i> Create Account</button>
          <div id="registerError" class="error-msg"></div>
        </form>
      </div>

      <!-- Multi-social login -->
      <div class="social-login">
        <button class="social-btn" id="googleBtn"><i class="fab fa-google"></i></button>
        <button class="social-btn" id="appleBtn"><i class="fab fa-apple"></i></button>
        <button class="social-btn" id="microsoftBtn"><i class="fab fa-microsoft"></i></button>
      </div>

      <!-- Security badge (enhanced) -->
      <div style="display:flex; justify-content:center; gap:1.5rem; font-size:0.8rem; color:var(--text-secondary);">
        <span><i class="fas fa-check-circle" style="color:#10b981;"></i> HIPAA Ready</span>
        <span><i class="fas fa-lock"></i> 256-bit encrypted</span>
      </div>

      <!-- Demo access (original)
      <div class="demo-section">
        <p><i class="fas fa-flask"></i> Demo access (bypass login)</p>
        <div class="demo-buttons">
          <a href="patient.html" class="demo-btn"><i class="fas fa-user"></i> Patient</a>
          <a href="doctor.html" class="demo-btn"><i class="fas fa-stethoscope"></i> Doctor</a>
          <a href="admin.html" class="demo-btn"><i class="fas fa-user-cog"></i> Admin</a>
        </div>
      </div> -->

      <!-- Login activity (fake)
      <div style="text-align:center; margin-top:1rem; font-size:0.7rem; color:var(--text-secondary);">
        <i class="fas fa-clock"></i> Last login: Today 09:24 · Cairo
      </div> -->

      <!-- Footer -->
      <div class="login-footer">
        © 2026 Smart Health
      </div>
    </div>
  </div>
    <!-- ==================== FIREBASE & SCRIPTS (as requested) ==================== -->
      <!-- Firebase SDK (v8 compat) - commented for demo, uncomment when ready -->
      
      <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
      <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
      <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
      <script src="js/firebase.js"></script>
     
    <!-- MQTT library (real connection, currently simulated internally) -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <!-- Local Firebase config placeholder -->
  <!-- <script src="js/firebase.js"></script> -->
  <script src="js/index.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
