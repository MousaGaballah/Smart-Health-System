<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · Smart Health · Administration Panel</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <!-- Chart.js and ApexCharts (for potential analytics) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <!-- Firebase (commented out – uncomment when backend ready) -->
    <!-- <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script> -->
    <style>
        /* ---------- RESET & GLOBAL ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ---------- CSS VARIABLES (LIGHT/DARK THEMES) ---------- */
        :root {
            --bg-body: #f8fafd;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --sidebar-bg: #ffffff;
            --sidebar-border: #e9eef2;
            --card-bg: #ffffff;
            --card-border: #edf2f7;
            --input-border: #e2e8f0;
            --input-bg: #ffffff;
            --hover-bg: #f8fafc;
            --active-bg: #eef2ff;
            --active-color: #2563eb;
            --icon-color: #64748b;
            --stat-sub-color: #3b82f6;
            --badge-completed-bg: #dcfce7;
            --badge-completed-color: #166534;
            --badge-delayed-bg: #fee2e2;
            --badge-delayed-color: #b91c1c;
            --badge-risk-bg: #fff3cd;
            --badge-risk-color: #856404;
            --badge-ongoing-bg: #e6f0ff;
            --badge-ongoing-color: #2563eb;
            --alert-bg: #fff8e8;
            --alert-border: #f59e0b;
            --chart-grid: rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg-body: #0b1120;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --sidebar-bg: #1e293b;
            --sidebar-border: #334155;
            --card-bg: #1e293b;
            --card-border: #334155;
            --input-border: #334155;
            --input-bg: #0f172a;
            --hover-bg: #334155;
            --active-bg: #2563eb20;
            --active-color: #60a5fa;
            --icon-color: #94a3b8;
            --stat-sub-color: #60a5fa;
            --badge-completed-bg: #16653440;
            --badge-completed-color: #86efac;
            --badge-delayed-bg: #b91c1c40;
            --badge-delayed-color: #fca5a5;
            --badge-risk-bg: #854d0e40;
            --badge-risk-color: #fde047;
            --badge-ongoing-bg: #2563eb40;
            --badge-ongoing-color: #93c5fd;
            --alert-bg: #854d0e20;
            --alert-border: #fbbf24;
            --chart-grid: rgba(255,255,255,0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.2s ease;
        }

        /* ---------- SIDEBAR ---------- */
        .app-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--sidebar-border);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease, background 0.3s ease;
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.02);
        }

        .sidebar.collapsed {
            width: 80px;
            padding: 2rem 0.8rem;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.5rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--active-color);
        }

        .logo-area i {
            font-size: 2rem;
            background: linear-gradient(145deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .collapse-btn {
            background: none;
            border: 1px solid var(--input-border);
            border-radius: 12px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--icon-color);
            cursor: pointer;
            transition: all 0.2s;
        }

        .collapse-btn:hover {
            background: var(--hover-bg);
            color: var(--active-color);
            border-color: var(--active-color);
        }

        .sidebar-menu {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            border-radius: 16px;
            color: var(--text-secondary);
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            white-space: nowrap;
            text-decoration: none;
        }

        .menu-item i {
            font-size: 1.3rem;
            width: 24px;
            color: var(--icon-color);
        }

        .menu-item.active {
            background: var(--active-bg);
            color: var(--active-color);
        }

        .menu-item.active i {
            color: var(--active-color);
        }

        .menu-item:hover:not(.active) {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .sidebar.collapsed .menu-item span {
            display: none;
        }

        .sidebar.collapsed .logo-area span {
            display: none;
        }

        .sidebar-footer {
            margin-top: auto;
            border-top: 1px solid var(--sidebar-border);
            padding-top: 1.5rem;
        }

        /* ---------- MAIN CONTENT ---------- */
        .main-content {
            flex: 1;
            padding: 2rem 2.5rem;
            overflow-y: auto;
        }

        /* top header */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .search-area {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border-radius: 60px;
            padding: 0.3rem 0.3rem 0.3rem 1.5rem;
            border: 1px solid var(--input-border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .search-area i {
            color: var(--icon-color);
        }

        .search-area input {
            border: none;
            padding: 0.6rem 1rem;
            font-size: 0.95rem;
            width: 260px;
            outline: none;
            background: transparent;
            color: var(--text-primary);
        }

        .search-area button {
            background: var(--active-color);
            border: none;
            border-radius: 40px;
            padding: 0.6rem 1.5rem;
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-area button:hover {
            opacity: 0.9;
        }

        .date-badge {
            background: var(--card-bg);
            border-radius: 40px;
            padding: 0.5rem 1.5rem;
            border: 1px solid var(--input-border);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: var(--text-primary);
        }

        .date-badge i {
            color: var(--active-color);
        }

        /* stats cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 1.6rem 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.03);
            border: 1px solid var(--card-border);
            transition: 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -8px rgba(37,99,235,0.1);
            border-color: var(--active-color);
        }

        .stat-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-sub {
            color: var(--stat-sub-color);
            font-weight: 600;
            margin-top: 0.3rem;
            font-size: 0.9rem;
        }

        /* form container (admin) */
        .form-container {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 2rem;
            margin: 2rem 0;
            border: 1px solid var(--card-border);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border: 1.5px solid var(--input-border);
            border-radius: 30px;
            font-size: 0.95rem;
            background: var(--input-bg);
            color: var(--text-primary);
            outline: none;
            transition: 0.2s;
        }

        .form-control:focus {
            border-color: var(--active-color);
            box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
        }

        .btn {
            background: var(--active-color);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 0.8rem 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        /* table */
        .table-container {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 1.8rem;
            margin: 2rem 0;
            border: 1px solid var(--card-border);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1rem 0.5rem 0.8rem;
            color: var(--text-secondary);
            font-weight: 600;
            border-bottom: 1px solid var(--card-border);
        }

        td {
            padding: 1rem 0.5rem;
            border-bottom: 1px solid var(--card-border);
            color: var(--text-primary);
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-active {
            background: var(--badge-completed-bg);
            color: var(--badge-completed-color);
        }

        .status-inactive {
            background: var(--badge-delayed-bg);
            color: var(--badge-delayed-color);
        }

        .action-btn {
            background: none;
            border: 1px solid var(--input-border);
            border-radius: 30px;
            padding: 0.3rem 1rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
            margin-right: 0.5rem;
        }

        .action-btn:hover {
            background: var(--hover-bg);
            color: var(--active-color);
            border-color: var(--active-color);
        }

        .action-btn.delete:hover {
            background: #fee2e2;
            color: #b91c1c;
            border-color: #b91c1c;
        }

        /* responsiveness */
        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(2,1fr); }
        }

        @media (max-width: 900px) {
            .app-wrapper { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--sidebar-border); }
            .main-content { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <!-- SIDEBAR (admin version) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-area">
                    <i class="fas fa-heartbeat"></i>
                    <span>SmartHealth</span>
                </div>
                <button class="collapse-btn" id="collapseSidebar"><i class="fas fa-chevron-left"></i></button>
            </div>
            <div class="sidebar-menu">
                <a href="javascript:void(0)" class="menu-item active" data-page="dashboard">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="javascript:void(0)" class="menu-item" data-page="patients">
                    <i class="fas fa-users"></i>
                    <span>Patients</span>
                </a>
                <a href="javascript:void(0)" class="menu-item" data-page="doctors">
                    <i class="fas fa-user-md"></i>
                    <span>Doctors</span>
                </a>
                <a href="javascript:void(0)" class="menu-item" data-page="reports">
                    <i class="fas fa-file-alt"></i>
                    <span>Reports</span>
                </a>
                <a href="javascript:void(0)" class="menu-item" data-page="settings">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </div>
            <div class="sidebar-footer">
                <a href="javascript:void(0)" class="menu-item" data-page="support">
                    <i class="fas fa-headset"></i>
                    <span>Support</span>
                </a>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- Top bar with search, date, and theme toggle -->
            <div class="top-bar">
                <div class="search-area">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search users...">
                    <button><i class="fas fa-sliders-h"></i> Filters</button>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div class="date-badge">
                        <i class="fas fa-calendar-alt"></i>
                        <span>Last 30 days</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <!-- Theme Toggle Button (fixed) -->
                    <button class="collapse-btn" id="themeToggle" style="width:45px;height:45px;">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>

            <!-- STATS CARDS (admin overview) -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-title">Total Patients</div>
                    <div class="stat-value" id="totalPatients">24</div>
                    <div class="stat-sub"><i class="fas fa-arrow-up"></i> +12%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Active Doctors</div>
                    <div class="stat-value" id="totalDoctors">8</div>
                    <div class="stat-sub"><i class="fas fa-check-circle" style="color:#10b981;"></i> 6 online</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Critical Cases</div>
                    <div class="stat-value" id="criticalCases">3</div>
                    <div class="stat-sub"><i class="fas fa-exclamation-triangle" style="color:#e11d48;"></i> high</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Bed Occupancy</div>
                    <div class="stat-value" id="bedOccupancy">86%</div>
                    <div class="stat-sub">32/37 beds</div>
                </div>
            </div>

            <!-- ADD USER FORM (original IDs preserved) -->
            <h2>➕ Add New User</h2>
            <div class="form-container">
                <form id="addUserForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" class="form-control" id="newName" placeholder="e.g., John Smith" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" class="form-control" id="newEmail" placeholder="user@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" class="form-control" id="newPassword" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select class="form-control" id="newRole">
                            <option value="patient">Patient</option>
                            <option value="doctor">Doctor</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">Create User</button>
                </form>
            </div>

            <!-- USERS TABLE (original IDs preserved) -->
            <h2>👥 User Management</h2>
            <div class="table-container">
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- JS will populate -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- JavaScript files (integrated, removed theme.js to avoid conflict) -->
    <script src="js/firebase.js"></script>
    <!-- <script src="js/theme.js"></script> --> <!-- Removed because theme is handled inline -->
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
    <!-- Integrated JavaScript with fixed theme toggle -->
    <script>
        (function() {
            "use strict";

            // ==================== GLOBAL VARIABLES ====================
            let usersData = [
                { name: 'Dr. Emily Davis', email: 'emily.davis@hospital.com', role: 'doctor', status: 'active' },
                { name: 'John Doe', email: 'john.doe@example.com', role: 'patient', status: 'active' },
                { name: 'Jane Smith', email: 'jane.smith@example.com', role: 'patient', status: 'active' },
                { name: 'Admin User', email: 'admin@example.com', role: 'admin', status: 'active' },
                { name: 'Dr. Michael Chen', email: 'michael.chen@hospital.com', role: 'doctor', status: 'inactive' }
            ];

            // ==================== THEME TOGGLE (FIXED) ====================
            const themeToggle = document.getElementById('themeToggle');
            const html = document.documentElement;
            
            // Load saved theme from localStorage
            const savedTheme = localStorage.getItem('theme') || 'light';
            html.setAttribute('data-theme', savedTheme);
            
            // Update icon based on current theme
            function updateThemeIcon() {
                const icon = themeToggle.querySelector('i');
                if (html.getAttribute('data-theme') === 'dark') {
                    icon.className = 'fas fa-sun';
                } else {
                    icon.className = 'fas fa-moon';
                }
            }
            updateThemeIcon();

            // Toggle theme on button click
            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    const currentTheme = html.getAttribute('data-theme');
                    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                    html.setAttribute('data-theme', newTheme);
                    localStorage.setItem('theme', newTheme);
                    updateThemeIcon();
                });
            }

            // ==================== SIDEBAR COLLAPSE ====================
            const sidebar = document.getElementById('sidebar');
            const collapseBtn = document.getElementById('collapseSidebar');
            collapseBtn.addEventListener('click', () => {
                sidebar.classList.toggle('collapsed');
                const icon = collapseBtn.querySelector('i');
                if (sidebar.classList.contains('collapsed')) {
                    icon.classList.remove('fa-chevron-left');
                    icon.classList.add('fa-chevron-right');
                } else {
                    icon.classList.remove('fa-chevron-right');
                    icon.classList.add('fa-chevron-left');
                }
            });

            // ==================== SIDEBAR ACTIVE STATE ====================
            const menuItems = document.querySelectorAll('.menu-item');
            menuItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    menuItems.forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                    // Future navigation
                });
            });

            // ==================== STATS UPDATE (simulated) ====================
            function updateStats() {
                // Randomize stats slightly for demo
                document.getElementById('totalPatients').innerText = Math.floor(Math.random() * 10 + 20);
                document.getElementById('totalDoctors').innerText = Math.floor(Math.random() * 5 + 5);
                document.getElementById('criticalCases').innerText = Math.floor(Math.random() * 5 + 1);
                document.getElementById('bedOccupancy').innerText = Math.floor(Math.random() * 20 + 70) + '%';
            }
            setInterval(updateStats, 10000);

            // ==================== USERS TABLE RENDERING ====================
            const tbody = document.getElementById('usersTableBody');

            function renderUsers() {
                tbody.innerHTML = '';
                usersData.forEach((user, index) => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><b>${user.name}</b></td>
                        <td>${user.email}</td>
                        <td>${user.role.charAt(0).toUpperCase() + user.role.slice(1)}</td>
                        <td><span class="status-badge ${user.status === 'active' ? 'status-active' : 'status-inactive'}">${user.status}</span></td>
                        <td>
                            <button class="action-btn" onclick="editUser(${index})"><i class="fas fa-edit"></i> Edit</button>
                            <button class="action-btn delete" onclick="deleteUser(${index})"><i class="fas fa-trash"></i> Delete</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }

            // Make functions global for onclick
            window.editUser = function(index) {
                const user = usersData[index];
                const newName = prompt('Edit name:', user.name);
                if (newName) {
                    usersData[index].name = newName;
                    renderUsers();
                }
            };

            window.deleteUser = function(index) {
                if (confirm('Are you sure you want to delete this user?')) {
                    usersData.splice(index, 1);
                    renderUsers();
                }
            };

            // ==================== ADD USER FORM HANDLER ====================
            document.getElementById('addUserForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('newName').value;
                const email = document.getElementById('newEmail').value;
                const password = document.getElementById('newPassword').value;
                const role = document.getElementById('newRole').value;

                // Simulate adding user
                usersData.push({
                    name: name,
                    email: email,
                    role: role,
                    status: 'active'
                });
                renderUsers();
                alert(`User ${name} created successfully (demo mode).`);
                e.target.reset();
            });

            // Initial render
            renderUsers();

            // ==================== LOGOUT BUTTON (simulated) ====================
            document.getElementById('logoutBtn').addEventListener('click', () => {
                window.location.href = 'index.html';
            });
        })();
    </script>
    <!-- 
        FIREBASE NOTES:
        To enable real Firebase, uncomment SDK scripts in <head> and ensure firebase.js is configured.
        The current implementation uses mock data and simulates admin functions.
    -->
</body>
</html>
